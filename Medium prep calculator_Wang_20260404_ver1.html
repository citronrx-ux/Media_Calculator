<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cell Culture Media Calculator</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .calculator {
            background-color: #ffffff;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 1.5rem;
        }
        .input-group {
            margin-bottom: 1.2rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.95rem;
        }
        input {
            width: 100%;
            padding: 0.6rem;
            border: 1px solid #ced4da;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #4dabf7;
            box-shadow: 0 0 0 3px rgba(77, 171, 247, 0.2);
        }
        .result-box {
            margin-top: 2rem;
            padding: 1.5rem;
            background-color: #e9ecef;
            border-radius: 8px;
            border-left: 5px solid #007bff;
        }
        .result-item {
            margin-bottom: 0.8rem;
            font-size: 1.1rem;
        }
        .result-item:last-child {
            margin-bottom: 0;
        }
        .result-item span {
            font-weight: bold;
            color: #007bff;
            font-size: 1.2rem;
        }
        .error {
            color: #dc3545;
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            padding: 0.5rem;
            border-radius: 6px;
            font-size: 0.9rem;
            display: none;
            margin-top: 1rem;
        }
    </style>
</head>
<body>

<div class="calculator">
    <h2>🧪 Media Prep Calculator</h2>

    <div class="input-group">
        <label for="totalVolume">Total Media Volume (mL)</label>
        <input type="number" id="totalVolume" value="100" min="0" step="any" oninput="calculate()">
    </div>

    <div class="input-group">
        <label for="targetSerum">Target Serum Concentration (%)</label>
        <input type="number" id="targetSerum" value="10" min="0" max="100" step="any" oninput="calculate()">
    </div>

    <div class="input-group">
        <label for="baseSerum">Base Media Serum Concentration (%)</label>
        <input type="number" id="baseSerum" value="0" min="0" max="100" step="any" oninput="calculate()">
    </div>

    <div class="error" id="errorMsg">⚠️ Error: Target concentration must be ≥ base media concentration!</div>

    <div class="result-box">
        <div class="result-item">Required Pure Serum: <span id="serumResult">10.00</span> mL</div>
        <div class="result-item">Required Base Media: <span id="baseResult">90.00</span> mL</div>
    </div>
</div>

<script>
    function calculate() {
        // Get input values
        const totalVolume = parseFloat(document.getElementById('totalVolume').value);
        const targetSerum = parseFloat(document.getElementById('targetSerum').value);
        const baseSerum = parseFloat(document.getElementById('baseSerum').value);
        
        // Get DOM elements
        const errorMsg = document.getElementById('errorMsg');
        const serumResult = document.getElementById('serumResult');
        const baseResult = document.getElementById('baseResult');

        // Handle empty or invalid inputs
        if (isNaN(totalVolume) || isNaN(targetSerum) || isNaN(baseSerum)) {
            serumResult.textContent = '0.00';
            baseResult.textContent = '0.00';
            errorMsg.style.display = 'none';
            return;
        }

        // Exception handling: Cannot dilute high concentration to reach low concentration
        if (baseSerum > targetSerum) {
            errorMsg.style.display = 'block';
            serumResult.textContent = '0.00';
            baseResult.textContent = '0.00';
            return;
        } else {
            errorMsg.style.display = 'none';
        }

        let serumVolume = 0;
        let baseVolume = totalVolume;

        // If base media is already at target concentration, no pure serum is needed
        if (targetSerum === baseSerum) {
            serumVolume = 0;
            baseVolume = totalVolume;
        } else {
            // Calculate pure serum (100%) requirement based on the formula
            serumVolume = totalVolume * (targetSerum - baseSerum) / (100 - baseSerum);
            baseVolume = totalVolume - serumVolume;
        }

        // Render results and keep two decimal places
        serumResult.textContent = serumVolume.toFixed(2);
        baseResult.textContent = baseVolume.toFixed(2);
    }
    
    // Calculate initial values when the page loads
    window.onload = calculate;
</script>

</body>
</html>
